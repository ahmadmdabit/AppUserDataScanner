name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, x86]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract Version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = if ($tag.StartsWith('v')) { $tag.Substring(1) } else { $tag }
          if ($version -notmatch '^\d+\.\d+') { $version = "1.0.0" }
          echo "VERSION=$version" >> $env:GITHUB_ENV

      - name: Publish (win-${{ matrix.arch }})
        run: |
          dotnet publish src/AppUserDataScanner/AppUserDataScanner.csproj `
            -c Release `
            -r win-${{ matrix.arch }} `
            -o ./publish/win-${{ matrix.arch }} `
            --self-contained true `
            /p:Version=${{ env.VERSION }} `
            /p:PublishAot=true

      - name: Package Release Assets
        shell: pwsh
        run: |
          # Copy the EXE to the publish folder with the architecture suffix
          Copy-Item ./publish/win-${{ matrix.arch }}/AppUserDataScanner.exe ./publish/AppUserDataScanner-win-${{ matrix.arch }}.exe
          
          # Create the ZIP archive
          Compress-Archive -Path ./publish/win-${{ matrix.arch }}/AppUserDataScanner.exe `
                           -DestinationPath ./publish/AppUserDataScanner-win-${{ matrix.arch }}.zip

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ./publish/AppUserDataScanner-win-${{ matrix.arch }}.exe
            ./publish/AppUserDataScanner-win-${{ matrix.arch }}.zip
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
